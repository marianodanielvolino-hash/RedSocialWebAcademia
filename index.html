<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundación Red Social | Web Integral</title>
  <meta name="description" content="Web integral de Fundación Red Social Academia.">
  <meta http-equiv="refresh" content="0; url=./Red%20Social%20Web%20Integral.dc.html">
  <style>
    :root {
      --papel: #F7F1E7;
      --tierra: #33281F;
      --magenta: #ED1686;
      --naranja: #FF9E19;
      --grad: linear-gradient(135deg, var(--magenta), var(--naranja));
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--papel);
      color: var(--tierra);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, calc(100% - 40px));
      padding: 42px;
      border-radius: 28px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 24px 60px rgba(51,40,31,.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 54px);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    p {
      margin: 0 0 28px;
      font-size: 18px;
      color: rgba(51,40,31,.72);
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 14px;
      background: var(--grad);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 14px 34px rgba(237,22,134,.24);
    }
  </style>
</head>
<body>
  <main>
    <h1>Fundación Red Social</h1>
    <p>Abriendo la web integral...</p>
    <a href="./Red%20Social%20Web%20Integral.dc.html">Abrir web integral</a>
  </main>
</body>
</html>
