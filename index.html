<!doctype html>
<html lang="es">
<head>

  </style>
</head>
<body>
  <main>

      try {

        let html = await response.text();
        const replacements = [
          ['assets/logo-red-social.png', 'assets/logo-red-social.svg'],

          ['Fortalecemos instituciones y ciudadanía.', 'Fortalecemos instituciones, comunidades y equipos.'],

          ['Una fundación para fortalecer instituciones y ciudadanía', 'Una fundación para fortalecer lo público, lo social y lo organizacional'],

          ['API Humana, en seis movimientos', 'Un modo de trabajar, en seis movimientos'],

          ['Políticas públicas', 'Gestión pública, social y organizacional'],
          ['políticas públicas', 'gestión pública, social y organizacional'],

          ['Seguimiento de avance y certificación', 'Seguimiento de avance; certificación cuando corresponda'],
          ['Material alineado a la biblioteca técnica', 'Materiales, guías y documentos reutilizables'],
          ['Explorar la academia', 'Ver módulos de formación'],
          ['>Equipo</a>', '>Quiénes somos</a>'],
          ['>Equipo</div>', '>Quiénes somos</div>'],
          ['Un equipo interdisciplinario para problemas complejos', 'Personas y capacidades al servicio de una misión'],

        for (const [from, to] of replacements) {
          html = html.split(from).join(to);
        }
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
      }
    })();
